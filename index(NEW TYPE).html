<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📖 Quiz 3 - Premium Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <style>
    /* ============ DESIGN TOKENS ============
       Concept: "Exam Ledger" — the app looks like an admit card / OMR answer
       sheet rather than a generic chat-app card UI. Signature element: bubble
       (OMR-style) answer options with A/B/C/D markers via CSS counters.
    */
    :root {
      --bg-color: #F4F1E6;
      --card-bg: #FFFFFF;
      --text-color: #1C1B17;
      --text-soft: #76705F;
      --question-bg: #FFFFFF;
      --border-color: #D8D2BD;
      --btn-bg: #ECE7D6;
      --primary-color: #1F4D3D;
      --primary-soft: #2E6650;
      --accent: #D44B33;
      --accent-soft: #e8765f;
      --stamp: #1F4D3D;
      --progress-color: #1F4D3D;
      --exp-bg: #FBF4D9;
      --exp-border: #D9B23B;
      --danger: #C8392A;
      --success: #226B4E;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-body: 'Rubik', sans-serif;
      --radius: 14px;
      --bottombar-h: 64px;
    }
    [data-theme="dark"] {
      --bg-color: #12130F;
      --card-bg: #1B1C16;
      --text-color: #ECE8D8;
      --text-soft: #8C8772;
      --question-bg: #1F2018;
      --border-color: #34352A;
      --btn-bg: #23241B;
      --primary-color: #4CA083;
      --primary-soft: #66bb9c;
      --accent: #E8765F;
      --accent-soft: #f0987f;
      --stamp: #4CA083;
      --progress-color: #4CA083;
      --exp-bg: #2A2812;
      --exp-border: #D9B23B;
      --danger: #E0695A;
      --success: #5BC09B;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background-color: var(--bg-color);
      background-image:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.018) 0px, rgba(0,0,0,0.018) 1px, transparent 1px, transparent 26px);
      color: var(--text-color);
      margin: 0;
      padding: 16px 16px calc(var(--bottombar-h) + 28px) 16px;
      transition: background-color 0.3s, color 0.3s;
      min-height: 100vh;
    }

    /* --- LOADING SCREEN --- */
    #loadingScreen {
      position: fixed; inset: 0; background: var(--bg-color);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10001; gap: 12px;
    }
    #loadingScreen .loading-icon {
      font-size: 36px; width: 70px; height: 70px;
      display: flex; align-items: center; justify-content: center;
      border: 2px dashed var(--primary-color); border-radius: 50%;
      animation: pulseLoad 1.2s ease-in-out infinite;
    }
    @keyframes pulseLoad { 0%,100% { opacity: 0.5; transform: scale(0.95) rotate(-3deg); } 50% { opacity: 1; transform: scale(1.05) rotate(3deg); } }

    /* --- LOGIN: ADMIT CARD TICKET --- */
    #loginArea {
      position: fixed; inset: 0;
      background: var(--bg-color);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
      padding: 20px;
    }
    .ticket-card {
      background: var(--card-bg);
      max-width: 380px; width: 100%;
      border-radius: 18px;
      box-shadow: 0 25px 55px rgba(0,0,0,0.16);
      position: relative;
      animation: fadeIn 0.6s ease-out;
      overflow: visible;
    }
    .ticket-top {
      padding: 26px 26px 18px;
      border-bottom: 2px dashed var(--border-color);
      position: relative;
      text-align: center;
    }
    /* perforation holes along the dashed cut line */
    .ticket-top::before, .ticket-top::after {
      content: ""; position: absolute; bottom: -10px; width: 20px; height: 20px;
      background: var(--bg-color); border-radius: 50%;
    }
    .ticket-top::before { left: -10px; }
    .ticket-top::after { right: -10px; }
    .stamp-badge {
      width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 12px;
      border: 3px solid var(--stamp); color: var(--stamp);
      display: flex; align-items: center; justify-content: center; font-size: 26px;
      transform: rotate(-8deg);
      font-family: var(--font-display);
    }
    .ticket-top h1 { margin: 0; font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
    .ticket-top .ticket-id { margin-top: 4px; font-family: var(--font-mono); font-size: 11px; color: var(--text-soft); letter-spacing: 1px; text-transform: uppercase; }
    .ticket-bottom { padding: 22px 26px 26px; }

    .input-group { margin-bottom: 13px; text-align: left; }
    .input-group label { display: block; font-size: 10.5px; margin-bottom: 5px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.6px; font-family: var(--font-mono); }
    .login-input {
      width: 100%; padding: 12px 13px; border-radius: 10px;
      border: 1.5px solid var(--border-color); background: var(--btn-bg);
      color: var(--text-color); font-family: var(--font-body); box-sizing: border-box;
      font-size: 15px; transition: border-color 0.2s;
    }
    .login-input:focus { outline: none; border-color: var(--primary-color); }

    .email-login-btn {
      background: var(--primary-color); color: #fff; border: none; padding: 13px;
      border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 6px;
      transition: 0.2s; font-size: 14.5px; letter-spacing: 0.3px; font-family: var(--font-display);
    }
    .email-login-btn:hover { background: var(--primary-soft); }

    .modern-google-btn {
      background: var(--card-bg); color: var(--text-color); border: 1.5px solid var(--border-color);
      padding: 12px 22px; border-radius: 10px; font-size: 13.5px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
      transition: all 0.2s; margin-top: 14px;
    }
    .modern-google-btn:hover { border-color: var(--accent); }
    .modern-google-btn svg { width: 17px; height: 17px; }

    .guest-btn {
      background: transparent; color: var(--text-soft); border: 1.5px dotted var(--border-color);
      padding: 11px 22px; border-radius: 10px; width: 100%; margin-top: 12px; cursor: pointer;
      font-size: 12.5px; font-weight: 600; display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: all 0.2s; font-family: var(--font-mono);
    }
    .guest-btn:hover { background: var(--btn-bg); color: var(--text-color); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    /* --- PROFILE MENU (lives in top brand bar now) --- */
    .user-profile { position: relative; display: none; align-items: center; cursor: pointer; }
    .user-profile img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); }
    .profile-dropdown {
      position: absolute; top: 42px; right: 0; background: var(--card-bg);
      border: 1px solid var(--border-color); border-radius: 12px; min-width: 165px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.18); display: none; flex-direction: column;
      z-index: 10000; overflow: hidden;
    }
    .profile-dropdown button { padding: 11px 14px; border: none; background: transparent; color: var(--text-color); text-align: left; cursor: pointer; font-size: 13.5px; }
    .profile-dropdown button:hover { background: var(--btn-bg); }
    .profile-dropdown .user-info-header { padding: 11px 14px; border-bottom: 1px solid var(--border-color); font-weight: 700; font-size: 12.5px; color: var(--primary-color); font-family: var(--font-display); }

    /* --- TOP BRAND STRIP (slim, replaces old big header) --- */
    .brand-strip {
      max-width: 700px; margin: 0 auto 14px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 4px;
    }
    .brand-mark { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text-color); }
    .brand-mark .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

    .container {
      max-width: 700px; margin: auto; background: var(--card-bg);
      padding: 22px; border-radius: 18px; box-shadow: 0 6px 24px rgba(0,0,0,0.06);
      position: relative; border: 1px solid var(--border-color);
    }
    .progress-container { width: 100%; background: var(--border-color); height: 6px; border-radius: 4px; margin-bottom: 16px; display: none; overflow: hidden; }
    #progressBar { height: 100%; width: 0%; background: var(--accent); border-radius: 4px; transition: 0.4s; }

    /* --- FIXED BOTTOM ACTION BAR (signature layout shift) --- */
    .header-btns {
      display: none; justify-content: space-between; align-items: center;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: var(--card-bg); border-top: 1px solid var(--border-color);
      padding: 10px 18px; height: var(--bottombar-h);
      box-shadow: 0 -8px 24px rgba(0,0,0,0.06);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-right { display: flex; align-items: center; gap: 14px; }

    #themeBtn { background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--border-color); width: 36px; height: 36px; border-radius: 10px; cursor: pointer; display:flex; align-items:center; justify-content:center; }
    #quitBtn { padding: 9px 14px; font-size: 12.5px; background: var(--danger); color: white; border: none; cursor: pointer; border-radius: 10px; display: none; font-weight: 700; font-family: var(--font-mono); }
    #bookmarkActionBtn, #heartActionBtn { background: transparent; padding: 0; display: none; border:none; cursor:pointer; }
    #bookmarkActionBtn svg, #heartActionBtn svg { width: 24px; height: 24px; fill: none; stroke: var(--text-soft); stroke-width: 2; transition: 0.2s; }
    #bookmarkActionBtn.active svg { fill: var(--accent); stroke: var(--accent); }
    #heartActionBtn.active svg { fill: var(--danger); stroke: var(--danger); }

    .voice-switch { position: relative; display: inline-block; width: 32px; height: 17px; }
    .voice-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .3s; border-radius: 30px; }
    .slider:before { position: absolute; content: ""; height: 13px; width: 13px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--primary-color); }
    input:checked + .slider:before { transform: translateX(15px); }
    #timerDisplay {
      font-weight: 700; font-size: 14px; color: var(--danger); display: none;
      font-family: var(--font-mono); background: var(--btn-bg); padding: 6px 12px;
      border-radius: 8px; position: fixed; top: 14px; right: 14px; z-index: 600;
    }

    h2 { text-align: left; margin: 0 0 4px; color: var(--text-color); font-family: var(--font-display); font-weight: 700; font-size: 23px; }
    .h2-sub { font-size: 12px; color: var(--text-soft); margin-bottom: 18px; font-family: var(--font-mono); }

    select, input, .main-btn {
      padding: 12px 13px; font-size: 14.5px; margin-bottom: 12px; width: 100%; border-radius: 10px;
      border: 1.5px solid var(--border-color); background-color: var(--btn-bg); color: var(--text-color);
      box-sizing: border-box; font-family: var(--font-body);
    }
    select:focus, input:focus { outline: none; border-color: var(--accent); }
    .main-btn { cursor: pointer; font-weight: 700; transition: 0.2s; font-family: var(--font-display); }
    .main-btn:hover { transform: translateY(-1px); filter: brightness(1.04); }

    /* --- LEDGER LIST ROWS (replaces grid cards) --- */
    .button-grid { display: flex; flex-direction: column; margin-top: 6px; border-top: 1px dashed var(--border-color); }
    .grid-card {
      display: flex; align-items: center; gap: 14px; padding: 15px 4px;
      border: none; border-bottom: 1px dashed var(--border-color);
      cursor: pointer; text-align: left; background: transparent; width: 100%;
      transition: 0.18s; border-radius: 0;
    }
    .grid-card:hover { background: var(--btn-bg); padding-left: 10px; }
    .card-icon {
      font-size: 19px; width: 38px; height: 38px; flex-shrink: 0; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .orange-card .card-icon { background: var(--accent); }
    .blue-card .card-icon   { background: var(--primary-color); }
    .red-card .card-icon    { background: var(--danger); }
    .yellow-card .card-icon { background: var(--exp-border); }
    .card-content { display: flex; flex-direction: column; flex: 1; }
    .card-title { font-weight: 700; font-size: 14.5px; color: var(--text-color); font-family: var(--font-display); }
    .card-sub { font-size: 11px; opacity: 0.85; margin-top: 2px; color: var(--text-soft); }
    .grid-card::after {
      content: "→"; color: var(--text-soft); font-size: 16px; margin-left: auto; flex-shrink: 0;
    }

    .challenge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; background: var(--btn-bg); padding: 13px; border-radius: 12px; border: 1px solid var(--border-color); }
    .challenge-grid label { font-size: 10.5px; font-weight: 700; margin-bottom: 5px; display: block; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--font-mono); }

    /* --- QUESTION CARD: exam-paper style --- */
    #qCount { font-family: var(--font-mono); }
    .question-card {
      background: var(--question-bg);
      border: 1.5px solid var(--border-color);
      padding: 20px 18px 18px; border-radius: 12px; margin-bottom: 16px;
      font-size: 19px; font-weight: 600; line-height: 1.5; position: relative;
      font-family: var(--font-body);
    }
    .question-card::before {
      content: "Q"; position: absolute; top: -11px; left: 14px; background: var(--primary-color);
      color: #fff; font-family: var(--font-mono); font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 6px; letter-spacing: 1px;
    }
    .speak-btn { position: absolute; right: 10px; top: 10px; background: var(--btn-bg); border: none; border-radius: 8px; cursor: pointer; font-size: 15px; padding: 5px 8px; opacity: 0.8; }

    /* --- OMR BUBBLE OPTIONS (signature element) --- */
    #optionsBox { counter-reset: opt; }
    .option-btn {
      counter-increment: opt;
      display: flex; align-items: center; gap: 13px;
      background: var(--card-bg); border: 1.5px solid var(--border-color);
      color: var(--text-color); padding: 13px 15px; margin: 9px 0; border-radius: 10px; cursor: pointer;
      width: 100%; text-align: left; font-size: 15.5px; font-weight: 500; transition: 0.15s;
    }
    .option-btn::before {
      content: counter(opt, upper-alpha);
      flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: var(--text-soft);
      transition: 0.15s;
    }
    .option-btn:hover { border-color: var(--accent); }
    .option-btn:hover::before { border-color: var(--accent); color: var(--accent); }

    #nextBtn {
      display: none; background: var(--primary-color) !important; color: white !important; border: none;
      text-align: center; margin-top: 14px; width: 100%; padding: 13px; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: var(--font-display);
    }
    #nextBtn:hover { background: var(--primary-soft); }

    /* --- EXPLANATION: sticky note with washi tape --- */
    .explanation-box {
      display: none; background: var(--exp-bg); padding: 18px 16px 16px; margin-top: 24px 0 0;
      margin-top: 24px; border-radius: 4px; font-size: 14.5px; line-height: 1.65;
      color: #2b2410; position: relative; white-space: pre-line;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      transform: rotate(-0.4deg);
    }
    [data-theme="dark"] .explanation-box { color: #f0e6c0; }
    .explanation-box::before {
      content: ""; position: absolute; top: -10px; left: 50%; transform: translateX(-50%) rotate(-3deg);
      width: 70px; height: 20px; background: rgba(217,178,59,0.55); border-radius: 2px;
    }
    .explanation-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; padding-bottom: 8px; border-bottom: 1px dashed rgba(0,0,0,0.18); }
    .explanation-title { font-weight: 700; color: var(--exp-border); display: flex; align-items: center; gap: 6px; font-family: var(--font-display); font-size: 13.5px; }
    .edit-exp-toggle-btn { background: rgba(0,0,0,0.06); border: none; color: inherit; font-size: 11.5px; font-weight: 700; cursor: pointer; padding: 4px 9px; border-radius: 6px; font-family: var(--font-mono); }

    .explanation-input-area {
      display: none; margin-top: 14px; padding: 15px; background: var(--card-bg);
      border: 1.5px solid var(--border-color); border-radius: 12px;
      animation: fadeIn 0.3s ease-out;
    }
    .explanation-input-area textarea {
      width: 100%; height: 80px; padding: 11px; border-radius: 8px; border: 1.5px solid var(--border-color);
      background: var(--btn-bg); color: var(--text-color); resize: vertical; box-sizing: border-box;
      font-family: var(--font-body); font-size: 13.5px;
    }
    .explanation-input-area textarea:focus { border-color: var(--accent); outline: none; }
    .save-exp-btn {
      background: var(--primary-color); color: white; border: none; padding: 10px 16px; border-radius: 8px;
      cursor: pointer; margin-top: 10px; font-size: 13px; font-weight: 700; font-family: var(--font-display);
    }
    .save-exp-btn:hover { background: var(--primary-soft); }

    .backup-area { display: flex; gap: 10px; margin-top: 16px; border-top: 1px dashed var(--border-color); padding-top: 16px; }
    .backup-btn { flex: 1; padding: 10px; font-size: 11px; cursor: pointer; border-radius: 8px; border: 1.5px solid var(--border-color); background: var(--btn-bg); color: var(--text-soft); font-weight: 700; font-family: var(--font-mono); }
    .backup-btn:hover { color: var(--accent); border-color: var(--accent); }

    .tracker-card, .collection-card { display: none; margin-top: 12px; border: 1.5px solid var(--border-color); padding: 16px; border-radius: 14px; background: var(--card-bg); animation: fadeIn 0.3s ease-out; }
    .tracker-card h3, .collection-card h3 { font-family: var(--font-display); font-size: 15px; }
    .subject-group { margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; }
    .subject-title { background: var(--primary-color); color: white; padding: 10px; font-weight: 700; font-family: var(--font-display); font-size: 13px; }
    .chapter-row { display: flex; justify-content: space-between; padding: 10px; background: var(--card-bg); border-bottom: 1px dashed var(--border-color); align-items: center; font-size: 13px; }
    .status-badge { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .status-green { background: var(--success); } .status-yellow { background: var(--exp-border); } .status-red { background: var(--danger); }

    .resumeBtn-style { background: var(--accent) !important; color: white !important; }

    @media (max-width: 500px) {
      .question-card { font-size: 17px; }
      h2 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="loading-icon">📖</div>
  </div>

  <div id="loginArea" style="display:none;">
    <div class="ticket-card">
      <div class="ticket-top">
        <div class="stamp-badge">Q3</div>
        <h1>Quiz 3 Pro</h1>
        <div class="ticket-id">ADMIT • CARD • STUDY-SESSION</div>
      </div>
      <div class="ticket-bottom">
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="emailInput" class="login-input" placeholder="Gmail ID">
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="passwordInput" class="login-input" placeholder="Apna Password">
          </div>
          <button class="email-login-btn" onclick="loginWithEmail()">Login / Sign Up</button>
          <p style="margin-top:10px; font-size:11.5px; text-align:center;">
            <a href="javascript:void(0)" onclick="forgotPassword()" style="color: var(--primary-color); text-decoration:none; font-weight:700;">Forgot Password?</a>
          </p>
        <div style="margin: 14px 0; color: var(--text-soft); font-size: 11px; display:flex; align-items:center; gap:10px; font-family: var(--font-mono);">
          <span style="flex:1; height:1px; background:var(--border-color);"></span>OR<span style="flex:1; height:1px; background:var(--border-color);"></span>
        </div>
        <button class="modern-google-btn" onclick="loginWithGoogle()">
            <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
            Continue with Google
        </button>
        <button class="guest-btn" onclick="continueAsGuest()">
            <span style="font-size: 14px;">👤</span> BINA LOGIN KE CHALAYEIN
        </button>
      </div>
    </div>
  </div>

  <div id="timerDisplay">⏳ 00:00</div>

  <div class="brand-strip">
    <div class="brand-mark"><span class="dot"></span>QUIZ 3 PRO</div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="display:flex; align-items:center; gap:5px;">
        <span style="font-size:11px;">🔊</span>
        <label class="voice-switch">
          <input type="checkbox" id="autoReadSwitch">
          <span class="slider"></span>
        </label>
        <input type="range" id="voiceSpeed" min="0.5" max="1.5" step="0.1" value="1" style="width:46px;" onchange="saveVoiceSpeed(this.value)">
      </div>
      <div id="userProfile" class="user-profile" onclick="toggleProfileMenu(event)"></div>
    </div>
  </div>

  <div class="container" id="mainContainer" style="display:none;">
    <div class="progress-container" id="pCont"><div id="progressBar"></div></div>
    <div id="setupArea">
        <h2>Smart Quiz Pro</h2>
        <div class="h2-sub">SELECT SUBJECT &amp; START YOUR PRACTICE SESSION</div>
        <button id="resumeBtn" class="main-btn resumeBtn-style" style="display: none;" onclick="resumeQuiz()">🕒 पिछला क्विज़ जारी रखें</button>
        <select id="subjectSelect" onchange="updateChapters()"><option value="all">-- सभी विषय --</option></select>

        <div id="chapterCheckboxContainer" style="margin-bottom: 12px; padding: 12px; border: 1.5px solid var(--border-color); border-radius: 10px; background: var(--btn-bg); max-height: 180px; overflow-y: auto; display: none; text-align: left;"></div>

        <div class="challenge-grid">
          <div><label>सवाल</label><input type="number" id="customLimit" placeholder="10"></div>
          <div><label>मिनट</label><input type="number" id="customTime" placeholder="5"></div>
        </div>
        <button class="main-btn" onclick="startQuiz()" style="background: var(--primary-color); color: white;">🚀 Start Quiz</button>

        <div class="button-grid">
            <button id="weakAreasBtn" class="grid-card orange-card" style="display:none;" onclick="startWeakAreasQuiz()">
                <div class="card-icon">🎯</div>
                <div class="card-content">
                    <div class="card-title">Weak Areas (<span id="weakCount">0</span>)</div>
                    <div class="card-sub">Focus on your weak areas & improve them.</div>
                </div>
            </button>
            <button id="collectionMainBtn" class="grid-card blue-card" style="display:none;" onclick="toggleCollection()">
                <div class="card-icon">📚</div>
                <div class="card-content">
                    <div class="card-title">My Collections</div>
                    <div class="card-sub">Organize & review questions by subject.</div>
                </div>
            </button>
            <button class="grid-card red-card" onclick="toggleTracker()">
                <div class="card-icon">📊</div>
                <div class="card-content">
                    <div class="card-title">Revision Tracker</div>
                    <div class="card-sub">Monitor your scores and track progress.</div>
                </div>
            </button>
            <button id="savedPracticeBtn" class="grid-card yellow-card" style="display:none;" onclick="startSavedPractice()">
                <div class="card-icon">⭐</div>
                <div class="card-content">
                    <div class="card-title">Saved Questions</div>
                    <div class="card-sub">Practice your bookmarked questions.</div>
                </div>
            </button>
        </div>

        <div class="backup-area">
          <button class="backup-btn" onclick="exportData()">📤 BACKUP</button>
          <button class="backup-btn" onclick="document.getElementById('importFile').click()">📥 RESTORE</button>
          <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
        <div id="trackerArea" class="tracker-card">
          <h3 style="text-align:center;">📅 रिवीजन स्टेटस</h3>
          <div id="trackerContent"></div>
        </div>
        <div id="collectionArea" class="collection-card">
          <h3 style="text-align:center;">❤️ Collection Practice</h3>
          <select id="collSubFilter" onchange="updateCollChapters()"><option value="all">-- विषय चुनें --</option></select>
          <select id="collChFilter"><option value="all">-- अध्याय चुनें --</option></select>
          <button class="main-btn" onclick="startCollectionPractice()" style="background: var(--success); color: white; margin-top: 10px;">🚀 Practice Start</button>
        </div>
    </div>
    <div id="quizArea" style="display:none;"></div>
  </div>

  <!-- Fixed bottom action bar — appears only during an active quiz/profile session -->
  <div class="header-btns" id="mainHeader">
    <div class="header-left">
      <button id="themeBtn" onclick="toggleTheme()">🌙</button>
      <button id="bookmarkActionBtn" onclick="handleBookmarkClick()"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg></button>
      <button id="heartActionBtn" title="Subject-wise Collection" onclick="handleHeartClick()"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg></button>
    </div>
    <div class="header-right">
      <button id="quitBtn" onclick="quitQuiz()">⏹ QUIT</button>
    </div>
  </div>

  <script>
    // Everything is wrapped to run only after the DOM is parsed AND after the
    // deferred Firebase scripts above have executed. This keeps HTML parsing
    // fast (scripts no longer block rendering) while guaranteeing `firebase`
    // is defined before we touch it.
    document.addEventListener("DOMContentLoaded", function () {

    const firebaseConfig = {
      apiKey: "AIzaSyA_Wm4oRPvdHJ_9NVHrGGWaom5Y3lu6MBE",
      authDomain: "mystudyquiz-ac0d9.firebaseapp.com",
      databaseURL: "https://mystudyquiz-ac0d9-default-rtdb.firebaseio.com",
      projectId: "mystudyquiz-ac0d9",
      storageBucket: "mystudyquiz-ac0d9.firebasestorage.app",
      messagingSenderId: "258779460797",
      appId: "1:258779460797:web:2201be41a252ce0e53331b",
      measurementId: "G-CLXDSVMG0"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(e => console.warn("Persistence set failed:", e.message));

    let quizData = {}, allQuestionsFlat = [], selectedQuestions = [], wrongQuestions = [], currentIdx = 0, score = 0, timerInterval;
    let questionsAttempted = 0, currentSub = "", currentCh = "", isWeakMode = false;
    let savedList = [], revisionDates = {}, weakList = [], collections = {};
    let isGuest = false;

    window.onpopstate = function(event) {
      if (document.getElementById("quizArea").style.display === "block" ||
          document.getElementById("trackerArea").style.display === "block" ||
          document.getElementById("collectionArea").style.display === "block") {
        goToHome();
      }
    };

    auth.onAuthStateChanged((user) => {
        const loader = document.getElementById("loadingScreen");
        if (loader) loader.style.display = "none";

        const up = document.getElementById("userProfile");
        const guestStored = localStorage.getItem("quiz_guest_mode");

        if (user) {
            isGuest = false;
            localStorage.removeItem("quiz_guest_mode");
            document.getElementById("loginArea").style.display = "none";
            document.getElementById("mainContainer").style.display = "block";
            document.getElementById("mainHeader").style.display = "flex";

            const photo = user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            const name = user.displayName || user.email.split('@')[0];

            up.innerHTML = `
                <img src="${photo}" alt="User">
                <div id="profileDropdown" class="profile-dropdown">
                    <div class="user-info-header">Hi, ${name.split(' ')[0]}</div>
                    <button onclick="changeDisplayName()">✏️ Name Change</button>
                    <button onclick="logoutUser()" style="color:var(--danger); border-top:1px solid var(--border-color);">🚪 Logout</button>
                </div>`;
            up.style.display = "flex";
            syncFromFirebase(user.uid);
        } else if(guestStored === "true") {
            continueAsGuest();
        } else {
            document.getElementById("loginArea").style.display = "flex";
            document.getElementById("mainContainer").style.display = "none";
            document.getElementById("mainHeader").style.display = "none";
        }
    });

    function toggleProfileMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById("profileDropdown");
        if(menu) menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
    }

    window.onclick = function(event) {
        const menu = document.getElementById("profileDropdown");
        if (menu && !event.target.closest('#userProfile')) {
            menu.style.display = "none";
        }
    }

    function logoutUser() {
        if(confirm("Logout karein?")) {
            localStorage.removeItem("quiz_guest_mode");
            auth.signOut().then(() => location.reload());
        }
    }

    function changeDisplayName() {
        const newName = prompt("Naya Display Name likhein:");
        if (newName && auth.currentUser) {
            auth.currentUser.updateProfile({ displayName: newName })
            .then(() => {
                alert("Naam update ho gaya! Refresh kar rahe hain...");
                location.reload();
            }).catch(e => alert(e.message));
        }
    }

    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch((e) => alert("Login Failed: " + e.message));
    }

    function loginWithEmail() {
        const email = document.getElementById("emailInput").value;
        const password = document.getElementById("passwordInput").value;
        if(!email || !password) return alert("Email aur Password dono bhariye");

        auth.signInWithEmailAndPassword(email, password)
        .catch((error) => {
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential' || error.message.includes('INVALID_LOGIN_CREDENTIALS')) {
                auth.createUserWithEmailAndPassword(email, password)
                .then(() => alert("Account Created! Yehi aapka password set ho gaya hai."))
                .catch((signUpErr) => alert("Error: " + signUpErr.message));
            } else {
                alert("Login Error: " + error.message);
            }
        });
    }

    function forgotPassword() {
        const email = document.getElementById("emailInput").value;
        if(!email) return alert("Pehle apni Gmail ID likhein, fir Forgot Password par click karein.");
        auth.sendPasswordResetEmail(email)
        .then(() => alert("Password reset link aapki Gmail par bhej diya gaya hai."))
        .catch((error) => alert("Error: " + error.message));
    }

    function continueAsGuest() {
        isGuest = true;
        localStorage.setItem("quiz_guest_mode", "true");

        const guestData = localStorage.getItem("quiz_guest_data");
        if(guestData) {
            const data = JSON.parse(guestData);
            savedList = data.bookmarks || [];
            revisionDates = data.revision || {};
            weakList = data.weak || [];
            collections = data.collections || {};
        }

        document.getElementById("loginArea").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
        document.getElementById("mainHeader").style.display = "flex";
        const up = document.getElementById("userProfile");
        up.innerHTML = `
            <div style="font-size:22px;">👤</div>
            <div id="profileDropdown" class="profile-dropdown">
                <div class="user-info-header">Guest Mode</div>
                <button onclick="clearGuestAndLogin()">✨ Sign Up / Login</button>
            </div>`;
        up.style.display = "flex";
        initApp();
    }

    function clearGuestAndLogin() {
        localStorage.removeItem("quiz_guest_mode");
        location.reload();
    }

    function syncToFirebase() {
        const dataToSave = {
            bookmarks: savedList,
            revision: revisionDates,
            weak: weakList,
            collections: collections
        };

        if(isGuest) {
            localStorage.setItem("quiz_guest_data", JSON.stringify(dataToSave));
        } else {
            const user = auth.currentUser;
            if (!user) return;
            database.ref('users/' + user.uid).update(dataToSave);
        }
    }

    function syncFromFirebase(uid) {
        database.ref('users/' + uid).once('value').then((snapshot) => {
            const data = snapshot.val() || {};
            savedList = data.bookmarks || [];
            revisionDates = data.revision || {};
            weakList = data.weak || [];
            collections = data.collections || {};
            initApp();
        });
    }

    function initApp() {
      checkSavedBtn(); updateWeakBtn(); checkResumeStatus(); updateCollectionBtn();
      fetch("Demo.json", { cache: "no-cache" }).then(r => r.json()).then(j => {
        quizData = j;
        allQuestionsFlat = [];

        Object.keys(quizData).forEach(sub => {
          Object.keys(quizData[sub]).forEach(ch => {
            quizData[sub][ch].forEach((q, idx) => {
              q.id = `${sub}__${ch}__${idx}`;
              q.sub = sub; q.ch = ch;
              allQuestionsFlat.push(q);
            });
          });
        });

        migrateOldDataToIds();

        const s = document.getElementById("subjectSelect");
        s.innerHTML = "<option value='all'>-- सभी विषय --</option>";
        Object.keys(j).forEach(k => s.add(new Option(k, k)));

        checkSavedBtn(); updateWeakBtn(); updateCollectionBtn();
      });
    }

    function findFreshByText(qText) {
      return allQuestionsFlat.find(q => q.question === qText);
    }

    function migrateOldDataToIds() {
      let changed = false;

      savedList = savedList.map(item => {
        if (typeof item === "string") return item;
        if (item && item.question) {
          const fresh = findFreshByText(item.question);
          changed = true;
          return fresh ? fresh.id : null;
        }
        return null;
      }).filter(Boolean);

      weakList = weakList.map(item => {
        if (typeof item === "string") return item;
        if (item && item.question) {
          const fresh = findFreshByText(item.question);
          changed = true;
          return fresh ? fresh.id : null;
        }
        return null;
      }).filter(Boolean);

      Object.keys(collections).forEach(sub => {
        Object.keys(collections[sub]).forEach(ch => {
          collections[sub][ch] = collections[sub][ch].map(item => {
            if (typeof item === "string") return item;
            if (item && item.question) {
              const fresh = findFreshByText(item.question);
              changed = true;
              return fresh ? fresh.id : null;
            }
            return null;
          }).filter(Boolean);
        });
      });

      if (changed) syncToFirebase();
    }

    function resolveQuestionsByIds(ids) {
      return ids.map(id => allQuestionsFlat.find(q => q.id === id)).filter(Boolean);
    }

    function checkResumeStatus() {
      const session = JSON.parse(localStorage.getItem("quiz_session"));
      const btn = document.getElementById("resumeBtn");
      if (session) {
        btn.innerText = `🕒 पिछला क्विज़ जारी रखें (Q. ${session.currentIdx + 1})`;
        btn.style.display = "block";
      } else btn.style.display = "none";
    }

    function saveCurrentSession() {
      const idList = selectedQuestions.map(q => q.id);
      localStorage.setItem("quiz_session", JSON.stringify({
        idList, currentIdx, score, questionsAttempted, currentSub, currentCh, isWeakMode
      }));
    }

    function clearSession() {
      localStorage.removeItem("quiz_session");
      document.getElementById("resumeBtn").style.display = "none";
    }

    function resumeQuiz() {
      const session = JSON.parse(localStorage.getItem("quiz_session"));
      if (session) {
        if (session.idList) {
          selectedQuestions = resolveQuestionsByIds(session.idList);
        } else if (session.selectedQuestions) {
          selectedQuestions = session.selectedQuestions.map(q => findFreshByText(q.question) || q);
        }
        currentIdx = session.currentIdx; score = session.score;
        questionsAttempted = session.questionsAttempted;
        currentSub = session.currentSub; currentCh = session.currentCh;
        isWeakMode = session.isWeakMode;
        if (selectedQuestions.length === 0) { clearSession(); return; }
        initQuizUI_Display(); renderLayout(); showQuestion();
      }
    }

    function exportData() {
      const data = { bookmarks: savedList, revision: revisionDates, weak: weakList, collections: collections };
      const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `quiz_backup.json`;
      a.click();
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          savedList = data.bookmarks || [];
          revisionDates = data.revision || {};
          weakList = data.weak || [];
          collections = data.collections || {};
          migrateOldDataToIds();
          syncToFirebase();
          location.reload();
        } catch (err) { alert("गलत फाइल!"); }
      };
      reader.readAsText(file);
    }

    function toggleTheme() {
      const b = document.body;
      b.hasAttribute("data-theme") ? b.removeAttribute("data-theme") : b.setAttribute("data-theme", "dark");
    }

    function updateChapters() {
      const s = document.getElementById("subjectSelect").value;
      const container = document.getElementById("chapterCheckboxContainer");

      container.innerHTML = "";

      if(s === "all" || !quizData[s]) {
        container.style.display = "none";
        return;
      }

      container.style.display = "block";

      container.innerHTML += `
        <div style="margin-bottom: 10px; display: flex; align-items: center; gap: 10px; font-weight: 600;">
          <input type="checkbox" id="selectAllChapters" onchange="toggleAllChapters(this)" style="width: 18px; height: 18px; cursor: pointer;">
          <label for="selectAllChapters" style="cursor:pointer; color: var(--primary-color); font-size: 14px;">-- सभी अध्याय (Select All) --</label>
        </div>
        <hr style="border: 0; border-top: 1px dashed var(--border-color); margin: 8px 0;">
      `;

      Object.keys(quizData[s]).forEach((chapter, idx) => {
        container.innerHTML += `
          <div style="margin: 8px 0; display: flex; align-items: center; justify-content: flex-start; gap: 10px; width: 100%;">
            <input type="checkbox" class="chapter-checkbox" value="${chapter}" id="ch_${idx}" style="width: 18px; height: 18px; cursor: pointer; flex-shrink: 0;">
            <label for="ch_${idx}" style="cursor:pointer; font-size: 14px; width: auto; text-align: left; display: inline-block;">${chapter}</label>
          </div>
        `;
      });
    }

    function toggleAllChapters(master) {
      const checkboxes = document.querySelectorAll(".chapter-checkbox");
      checkboxes.forEach(cb => cb.checked = master.checked);
    }

    function toggleTracker() {
      const area = document.getElementById("trackerArea");
      const wasOpen = area.style.display === "block";
      area.style.display = wasOpen ? "none" : "block";
      if(!wasOpen) {
        renderTracker();
        history.pushState({page: "tracker"}, "Tracker");
        setTimeout(() => area.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
      }
    }

    function toggleEditExplanation() {
      const inputArea = document.getElementById("inputExpArea");
      if(inputArea) {
        inputArea.style.display = (inputArea.style.display === "block") ? "none" : "block";
      }
    }

    function renderTracker() {
      const content = document.getElementById("trackerContent"), now = Date.now();
      content.innerHTML = "";
      Object.keys(quizData).forEach(subject => {
        let subHtml = `<div class="subject-group"><div class="subject-title">${subject}</div>`;
        Object.keys(quizData[subject]).forEach(chapter => {
          const lastDate = revisionDates[`${subject}_${chapter}`];
          let statusClass = "status-red", dateText = "कभी नहीं";
          if(lastDate) {
            const diffDays = Math.floor((now - lastDate) / (1000 * 60 * 60 * 24));
            dateText = new Date(lastDate).toLocaleDateString();
            if(diffDays <= 15) statusClass = "status-green";
            else if(diffDays <= 30) statusClass = "status-yellow";
          }
          subHtml += `<div class="chapter-row"><div><span class="status-badge ${statusClass}"></span>${chapter}</div><span style="font-size:11px; color: var(--text-soft);">${dateText}</span></div>`;
        });
        content.innerHTML += subHtml + `</div>`;
      });
    }

    function saveVoiceSpeed(val) { localStorage.setItem("quiz_voice_speed", val); }
    function speak(text) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = parseFloat(localStorage.getItem("quiz_voice_speed")) || 1;
      window.speechSynthesis.speak(u);
    }
    function readFullQuestion() {
      const q = selectedQuestions[currentIdx];
      speak(`${q.question}. विकल्प hain . . ${q.options.join(", , ")}`);
    }

    function startQuiz() {
      clearSession();
      isWeakMode = false;
      currentSub = document.getElementById("subjectSelect").value;

      let allTempQ = [];

      if (currentSub === "all") {
        Object.keys(quizData).forEach(s => Object.keys(quizData[s]).forEach(c => allTempQ = allTempQ.concat(quizData[s][c])));
        currentCh = "all";
      } else {
        const checkedBoxes = document.querySelectorAll(".chapter-checkbox:checked");

        if(checkedBoxes.length === 0) {
          Object.keys(quizData[currentSub]).forEach(c => allTempQ = allTempQ.concat(quizData[currentSub][c]));
          currentCh = "all";
        } else {
          let selectedChaps = [];
          checkedBoxes.forEach(cb => {
            selectedChaps.push(cb.value);
            allTempQ = allTempQ.concat(quizData[currentSub][cb.value]);
          });
          currentCh = selectedChaps.length === Object.keys(quizData[currentSub]).length ? "all" : "custom_mix";
        }
      }

      if(allTempQ.length === 0) return alert("सवाल नहीं मिले! कृपया चैप्टर सेलेक्ट करें।");

      const limit = parseInt(document.getElementById("customLimit").value);
      selectedQuestions = (limit > 0) ? allTempQ.sort(() => Math.random() - 0.5).slice(0, limit) : allTempQ.sort(() => Math.random() - 0.5);

      const mins = parseInt(document.getElementById("customTime").value);
      if(mins > 0) startTimer(mins);

      initQuizUI();
    }

    function initQuizUI() { currentIdx = score = questionsAttempted = 0; wrongQuestions = []; initQuizUI_Display(); renderLayout(); showQuestion(); }

    function initQuizUI_Display() {
      document.getElementById("setupArea").style.display = "none";
      document.getElementById("pCont").style.display = "block";
      document.getElementById("quizArea").style.display = "block";
      document.getElementById("quitBtn").style.display = "block";
      document.getElementById("bookmarkActionBtn").style.display = "flex";
      document.getElementById("heartActionBtn").style.display = "flex";

      history.pushState({page: "quiz"}, "Quiz");
    }

    function renderLayout() {
      document.getElementById("quizArea").innerHTML = `
        <div id="qCount" style="text-align:right; font-size:12px; font-weight:600; margin-bottom:6px; color: var(--text-soft);"></div>
        <div id="questionBox" class="question-card"></div>
        <div id="optionsBox"></div>
        <div id="resultBox" style="text-align:center; font-weight:700; margin-top:10px; font-family: var(--font-display);"></div>
        <button id="nextBtn" onclick="nextQuestionTrigger()">➡️ अगला सवाल</button>

        <div id="explanationBox" class="explanation-box"></div>

        <div id="inputExpArea" class="explanation-input-area">
          <label style="font-size:12.5px; font-weight:600; display:block; margin-bottom:8px; color: var(--text-color);">📝 व्याख्या लाइव एडिट करें:</label>
          <textarea id="customExpText" placeholder="यहाँ अपनी व्याख्या या शार्ट नोट्स टाइप करें..."></textarea>
          <button class="save-exp-btn" onclick="saveCustomExplanation()">✔ व्याख्या सुरक्षित करें</button>
        </div>`;
    }

    function findQuestionMeta(q) {
      if(q.sub && q.ch) return;
      for(let s in quizData) for(let c in quizData[s]) if(quizData[s][c].some(item => item.question === q.question)) { q.sub = s; q.ch = c; return; }
    }

    function getSafeQuestionKey(qText) {
      return btoa(unescape(encodeURIComponent(qText))).replace(/[/=+]/g, '_');
    }

    function saveCustomExplanation() {
      const q = selectedQuestions[currentIdx];
      const text = document.getElementById("customExpText").value.trim();
      const qKey = getSafeQuestionKey(q.question);

      if(!text) return alert("कृपया पहले कुछ व्याख्या लिखें!");

      let localExps = JSON.parse(localStorage.getItem("quiz_custom_explanations") || "{}");
      localExps[qKey] = text;
      localStorage.setItem("quiz_custom_explanations", JSON.stringify(localExps));

      q.customExplanation = text;

      if(!isGuest) {
        const user = auth.currentUser;
        if (user) {
          database.ref('users/' + user.uid + '/custom_explanations/' + qKey).set(text)
          .catch(e => console.warn("Firebase backup save failed (already safe locally):", e.message));
        }
      }

      alert("व्याख्या सुरक्षित हो गई!");

      const eBox = document.getElementById("explanationBox");
      eBox.innerHTML = `
        <div class="explanation-header-row">
          <span class="explanation-title">✨ व्याख्या (Live Updated)</span>
          <button class="edit-exp-toggle-btn" onclick="toggleEditExplanation()">Edit ✎</button>
        </div>
        <div>${text}</div>
      `;
      eBox.style.display = "block";
      document.getElementById("inputExpArea").style.display = "none";
    }

    function showQuestion() {
      const q = selectedQuestions[currentIdx];
      if(!q.sub || !q.ch) findQuestionMeta(q);

      if(document.getElementById("inputExpArea")) document.getElementById("inputExpArea").style.display = "none";

      const qKey = getSafeQuestionKey(q.question);
      let localExps = JSON.parse(localStorage.getItem("quiz_custom_explanations") || "{}");
      if(localExps[qKey] !== undefined) {
        q.customExplanation = localExps[qKey];
      } else if(!q.customExplanation && !isGuest) {
        const user = auth.currentUser;
        if(user) {
          database.ref('users/' + user.uid + '/custom_explanations/' + qKey).once('value').then(snap => {
            if(snap.exists() && !q.customExplanation) {
              q.customExplanation = snap.val();
              if(document.getElementById("explanationBox") && document.getElementById("explanationBox").style.display === "block") {
                document.getElementById("explanationBox").innerHTML = `
                  <div class="explanation-header-row">
                    <span class="explanation-title">💡 व्याख्या</span>
                    <button class="edit-exp-toggle-btn" onclick="toggleEditExplanation()">Edit ✎</button>
                  </div>
                  <div>${q.customExplanation}</div>`;
              }
            }
          });
        }
      }

      document.getElementById("progressBar").style.width = (currentIdx / selectedQuestions.length) * 100 + "%";
      document.getElementById("qCount").innerText = `सवाल: ${currentIdx + 1} / ${selectedQuestions.length}`;
      document.getElementById("questionBox").innerHTML = `${q.question} <button class="speak-btn" onclick="readFullQuestion()">🔊</button>`;
      if(document.getElementById("autoReadSwitch").checked) setTimeout(readFullQuestion, 500);
      document.getElementById("bookmarkActionBtn").classList.toggle("active", savedList.includes(q.id));
      let isHearted = (q.sub && q.ch && collections[q.sub] && collections[q.sub][q.ch]) ? collections[q.sub][q.ch].includes(q.id) : false;
      document.getElementById("heartActionBtn").classList.toggle("active", isHearted);
      const oBox = document.getElementById("optionsBox"), rBox = document.getElementById("resultBox"), nBtn = document.getElementById("nextBtn"), eBox = document.getElementById("explanationBox");
      oBox.innerHTML = ""; rBox.innerText = ""; nBtn.style.display = "none"; eBox.style.display = "none";

      q.options.forEach((opt) => {
        const b = document.createElement("button"); b.className = "option-btn"; b.innerText = opt;
        b.onclick = () => {
          questionsAttempted++;
          document.querySelectorAll(".option-btn").forEach(btn => btn.style.pointerEvents = "none");
          if(opt === q.answer) {
            score++; rBox.innerHTML = "<span style='color:var(--success)'>✅ सही जवाब!</span>";
            if(isWeakMode) { weakList = weakList.filter(id => id !== q.id); syncToFirebase(); }
          } else {
            rBox.innerHTML = `<span style='color:var(--danger)'>❌ गलत जवाब! सही उत्तर: ${q.answer}</span>`;
            wrongQuestions.push(q);
            if(!weakList.includes(q.id)) { weakList.push(q.id); syncToFirebase(); }
          }

          const finalExp = q.customExplanation || q.explanation;
          if(finalExp) {
            eBox.innerHTML = `
              <div class="explanation-header-row">
                <span class="explanation-title">💡 व्याख्या</span>
                <button class="edit-exp-toggle-btn" onclick="toggleEditExplanation()">Edit ✎</button>
              </div>
              <div>${finalExp}</div>
            `;
            eBox.style.display = "block";
          } else {
            eBox.innerHTML = `
              <div class="explanation-header-row">
                <span class="explanation-title">💡 व्याख्या</span>
                <button class="edit-exp-toggle-btn" onclick="toggleEditExplanation()">Add ✎</button>
              </div>
              <div style="color: var(--text-soft); font-style: italic; font-size: 13.5px;">इस सवाल की कोई व्याख्या नहीं है। नोट्स जोड़ने के लिए Edit पर क्लिक करें।</div>
            `;
            eBox.style.display = "block";
          }

          document.getElementById("customExpText").value = q.customExplanation || "";
          nBtn.style.display = "block"; saveCurrentSession();
        };
        oBox.appendChild(b);
      });
    }

    function handleHeartClick() {
      const q = selectedQuestions[currentIdx];
      if(!q.sub || !q.ch) findQuestionMeta(q);
      if(!q.sub || !q.ch) return;
      if(!collections[q.sub]) collections[q.sub] = {};
      if(!collections[q.sub][q.ch]) collections[q.sub][q.ch] = [];
      const idx = collections[q.sub][q.ch].indexOf(q.id);
      idx > -1 ? collections[q.sub][q.ch].splice(idx, 1) : collections[q.sub][q.ch].push(q.id);
      syncToFirebase(); document.getElementById("heartActionBtn").classList.toggle("active"); updateCollectionBtn();
    }

    function toggleCollection() {
      const area = document.getElementById("collectionArea");
      const wasOpen = area.style.display === "block";
      area.style.display = wasOpen ? "none" : "block";
      if(!wasOpen) {
        fillCollFilters();
        history.pushState({page: "collection"}, "Collection");
        setTimeout(() => area.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
      }
    }

    function fillCollFilters() {
      const sFilter = document.getElementById("collSubFilter");
      sFilter.innerHTML = "<option value='all'>-- All Saved Subjects --</option>";
      Object.keys(collections).forEach(s => sFilter.add(new Option(s, s)));
      updateCollChapters();
    }

    function updateCollChapters() {
      const s = document.getElementById("collSubFilter").value, cFilter = document.getElementById("collChFilter");
      cFilter.innerHTML = "<option value='all'>-- All Chapters --</option>";
      if(s !== "all" && collections[s]) Object.keys(collections[s]).forEach(c => cFilter.add(new Option(c, c)));
    }

    function startCollectionPractice() {
      const sub = document.getElementById("collSubFilter").value, ch = document.getElementById("collChFilter").value;
      let ids = [];
      if(sub === "all") Object.keys(collections).forEach(s => Object.keys(collections[s]).forEach(c => ids = ids.concat(collections[s][c])));
      else if(ch === "all") Object.keys(collections[sub]).forEach(c => ids = ids.concat(collections[sub][c]));
      else ids = collections[sub][ch];

      let qs = resolveQuestionsByIds(ids);
      if(qs.length === 0) return alert("कोई सवाल नहीं मिला!");
      clearSession(); isWeakMode = false; selectedQuestions = [...qs].sort(() => Math.random() - 0.5); initQuizUI();
    }

    function updateCollectionBtn() { document.getElementById("collectionMainBtn").style.display = Object.keys(collections).length > 0 ? "flex" : "none"; }
    function nextQuestionTrigger() { window.speechSynthesis.cancel(); currentIdx++; if(currentIdx < selectedQuestions.length) { saveCurrentSession(); showQuestion(); } else { showFinalResult(); } }

    function showFinalResult() {
      clearSession(); clearInterval(timerInterval); window.speechSynthesis.cancel();
      document.getElementById("timerDisplay").style.display = "none";
      document.getElementById("bookmarkActionBtn").style.display = "none";
      document.getElementById("heartActionBtn").style.display = "none";
      if (!isWeakMode && (questionsAttempted / selectedQuestions.length) * 100 >= 80 && currentSub !== "all" && currentCh !== "all" && currentCh !== "custom_mix") {
        revisionDates[`${currentSub}_${currentCh}`] = Date.now(); syncToFirebase();
      }
      document.getElementById("quizArea").innerHTML = `<div style="text-align:center;"><h3 style="font-family: var(--font-display);">🏁 रिजल्ट: ${score}/${selectedQuestions.length}</h3>` + (wrongQuestions.length > 0 ? `<button class="main-btn" style="background:var(--accent); color:white;" onclick="retryWrong()">🔄 गलत सुधारें (${wrongQuestions.length})</button>` : "") + `<button class="main-btn" onclick="goToHome()">🏠 होम</button></div>`;
      document.getElementById("quitBtn").style.display = "none";
      updateWeakBtn(); updateCollectionBtn();
    }

    function goToHome() {
      clearInterval(timerInterval);
      window.speechSynthesis.cancel();
      document.getElementById("quizArea").style.display = "none";
      document.getElementById("setupArea").style.display = "block";
      document.getElementById("pCont").style.display = "none";
      document.getElementById("quitBtn").style.display = "none";

      document.getElementById("trackerArea").style.display = "none";
      document.getElementById("collectionArea").style.display = "none";

      updateWeakBtn();
      checkResumeStatus();

      if(window.history.state) {
        history.replaceState(null, "");
      }
    }

    function startTimer(m) { let t = m * 60; document.getElementById("timerDisplay").style.display = "block"; timerInterval = setInterval(() => { let mins = Math.floor(t/60), secs = t%60; document.getElementById("timerDisplay").innerText = `⏳ ${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; if (--t < 0) { clearInterval(timerInterval); showFinalResult(); } }, 1000); }
    function handleBookmarkClick() {
      const q = selectedQuestions[currentIdx], idx = savedList.indexOf(q.id);
      idx > -1 ? savedList.splice(idx, 1) : savedList.push(q.id);
      syncToFirebase(); checkSavedBtn(); document.getElementById("bookmarkActionBtn").classList.toggle("active");
    }
    function checkSavedBtn() { document.getElementById("savedPracticeBtn").style.display = savedList.length > 0 ? "flex" : "none"; }
    function updateWeakBtn() { document.getElementById("weakAreasBtn").style.display = (weakList.length > 0) ? "flex" : "none"; if(document.getElementById("weakCount")) document.getElementById("weakCount").innerText = weakList.length; }
    function startSavedPractice() {
      clearSession(); isWeakMode = false;
      selectedQuestions = resolveQuestionsByIds(savedList).sort(() => Math.random() - 0.5);
      if(selectedQuestions.length === 0) return alert("कोई सवाल नहीं मिला!");
      initQuizUI();
    }
    function startWeakAreasQuiz() {
      clearSession(); isWeakMode = true;
      selectedQuestions = resolveQuestionsByIds(weakList).sort(() => Math.random() - 0.5);
      if(selectedQuestions.length === 0) return alert("कोई सवाल नहीं मिला!");
      initQuizUI();
    }
    function retryWrong() { selectedQuestions = [...wrongQuestions]; initQuizUI(); }
    function quitQuiz() { if(confirm("क्विज़ छोड़ें?")) showFinalResult(); }

    Object.assign(window, {
      toggleProfileMenu, logoutUser, changeDisplayName, loginWithGoogle, loginWithEmail,
      forgotPassword, continueAsGuest, clearGuestAndLogin, toggleTheme, updateChapters,
      toggleAllChapters, toggleTracker, toggleEditExplanation, startQuiz, resumeQuiz,
      exportData, importData, saveVoiceSpeed, readFullQuestion, saveCustomExplanation,
      handleHeartClick, toggleCollection, updateCollChapters, startCollectionPractice,
      nextQuestionTrigger, goToHome, handleBookmarkClick, startSavedPractice,
      startWeakAreasQuiz, retryWrong, quitQuiz
    });

    }); // end DOMContentLoaded
  </script>
</body>
</html>
